# Reference HTTPS config — certbot --nginx usually writes this automatically.
# Use manually only if you prefer certonly + hand-edited nginx.
#
# Prerequisites:
#   sudo mkdir -p /var/www/certbot
#   certs at /etc/letsencrypt/live/nlquery.yydigi.top/

# HTTP → HTTPS redirect (keep acme-challenge on port 80)
server {
    listen 80;
    listen [::]:80;
    server_name nlquery.yydigi.top;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nlquery.yydigi.top;

    ssl_certificate     /etc/letsencrypt/live/nlquery.yydigi.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nlquery.yydigi.top/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/nlq/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
