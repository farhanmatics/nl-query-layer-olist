# NLQ — nginx site config for ECS bare-metal deploy.
# Install: sudo cp deploy/nginx-nlq.conf /etc/nginx/sites-available/nlq
#          sudo ln -sf /etc/nginx/sites-available/nlq /etc/nginx/sites-enabled/nlq
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # Replace with your ECS public IP or domain
    server_name 47.88.23.2 _;

    root /opt/nlq/frontend/dist;
    index index.html;

    # React SPA — client-side routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # FastAPI backend (uvicorn on localhost only)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Static asset caching
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
