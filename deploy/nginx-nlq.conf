# NLQ — nginx site config (HTTP). Certbot adds HTTPS and redirects.
#
# Domain: nlquery.yydigi.top
# Install:
#   sudo cp deploy/nginx-nlq.conf /etc/nginx/sites-available/nlq
#   sudo ln -sf /etc/nginx/sites-available/nlq /etc/nginx/sites-enabled/nlq
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# Then: sudo bash deploy/setup-ssl.sh

server {
    listen 80;
    listen [::]:80;

    server_name nlquery.yydigi.top;

    root /opt/nlq/frontend/dist;
    index index.html;

    # Let's Encrypt HTTP-01 challenge (certbot)
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
